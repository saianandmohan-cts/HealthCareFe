<div class="dashboard-page">

  <section class="content-card">

    <div class="card-header">
      <h2>Book New Appointment</h2>
      <a routerLink="/patient" class="ghost-btn back-btn">
        Back to Dashboard
      </a>
    </div>

    <p class="muted">
      Fill in the details below to schedule your consultation.
    </p>

    <div *ngIf="booked" class="saved-banner">
      ✅ Appointment booked successfully!
    </div>

    <form
      #apptForm="ngForm"
      novalidate
      (ngSubmit)="submitAppointment()"
      class="edit-form">

      <div class="form-grid">

        <label>
          <span>Specialisation</span>
          <select
            name="specialisation"
            [(ngModel)]="selectedSpecialisation"
            (change)="onSpecialisationChange()"
            required
            #spec="ngModel">
            <option value="" disabled selected>Select Specialisation</option>
            <option *ngFor="let dept of uniqueDepartments" [value]="dept">
              {{ dept }}
            </option>
          </select>
          <small class="error" *ngIf="spec.invalid && spec.touched">
            Specialisation is required
          </small>
        </label>

        <label>
          <span>Doctor</span>
          <select
            name="doctorId"
            [(ngModel)]="appointment.doctorId"
            (change)="generateTimeSlots()" 
            [disabled]="!selectedSpecialisation"
            required
            #doctorId="ngModel">
            <option value="" disabled selected>
              {{ !selectedSpecialisation ? 'Choose specialisation first' : 'Select doctor' }}
            </option>
            <option *ngFor="let d of filteredDoctors" [value]="d.doctorId">
              {{ d.name }}
            </option>
          </select>

          <small class="error" *ngIf="doctorId.invalid && doctorId.touched">
            Doctor is required
          </small>
        </label>

        <label>
          <span>Date</span>
          <select
            name="date"
            [(ngModel)]="appointment.date"
            (change)="onDateChange()" required
            #date="ngModel">
            <option value="" disabled selected>Select date</option>
            <option *ngFor="let d of availableDates" [value]="d">
              {{ d | date:'mediumDate' }} </option>
          </select>

          <small class="error" *ngIf="date.invalid && date.touched">
            Date is required
          </small>
        </label>

        <label>
          <span>Time Slot</span>
          <select
            name="time"
            [(ngModel)]="appointment.time"
            required
            [disabled]="timeSlots.length === 0" #time="ngModel">
            <option value="" disabled selected>
              {{ timeSlots.length === 0 ? 'No slots available' : 'Select time' }}
            </option>
            
            <option
              *ngFor="let slot of timeSlots"
              [value]="slot.time"
              [disabled]="slot.disabled"
              [style.color]="slot.disabled ? '#d32f2f' : '#1b5e20'"
              [style.background-color]="slot.disabled ? '#f9fafb' : '#ffffff'">
              {{ slot.time }} {{ slot.disabled ? 'Unavailable' : 'Available' }}
            </option>
          </select>

          <small class="error" *ngIf="time.invalid && time.touched" style="color: #d32f2f; font-weight: 500; display: block; margin-top: 4px;">
            <span *ngIf="time.errors?.['required']">Time is required</span>
            <span *ngIf="time.errors?.['backendError']" class="backend-error-msg">
              ⚠️ {{ time.errors?.['backendError'] }}
            </span>
          </small>
        </label>

        <label>
          <span>Consultation Type</span>
          <select
            name="mode"
            [(ngModel)]="appointment.mode"
            required
            #mode="ngModel">
            <option value="" disabled selected>Select mode</option>
            <option>In-person</option>
            <option>Online</option>
          </select>

          <small class="error" *ngIf="mode.invalid && mode.touched">
            Consultation type is required
          </small>
        </label>

        <label class="wide">
          <span>Reason for Visit</span>
          <textarea
            rows="3"
            name="reason"
            [(ngModel)]="appointment.reason"
            required
            minlength="5"
            #reason="ngModel">
          </textarea>

          <small *ngIf="reason.invalid && reason.touched">
            <span class="error" *ngIf="reason.errors?.['required']">
              Reason is required
            </span>
            <span class="error" *ngIf="reason.errors?.['minlength']">
              Minimum 5 characters required
            </span>
          </small>
        </label>

      </div>

      <div class="form-actions">
        <button
          type="submit"
          class="primary-btn sm"
          [disabled]="apptForm.invalid || booked">
          Book Appointment
        </button>

        <button
          type="button" class="ghost-btn sm"
          (click)="clearFormReset()">
          Clear
        </button>
      </div>

    </form>

  </section>

</div>
