<div class="container py-4">
  <div class="card shadow-lg rounded-4 border-0 overflow-hidden">
    
    <div class="bg-primary bg-gradient p-4 text-white d-flex align-items-center justify-content-between">
      <h4 class="mb-0 fw-bold d-flex align-items-center gap-2">
        <span class="fs-3">📝</span> New Consultation & Prescription
      </h4>
      <span class="badge bg-white text-primary rounded-pill px-3 py-2 fw-semibold shadow-sm">
        ID: #{{ prescriptionForm.get('consultationId')?.value }}
      </span>
    </div>

    <div class="card-body p-4">
      
      @if (errorMessage) {
        <div class="alert alert-danger rounded-3 d-flex align-items-center gap-2" role="alert">
          <span>⚠️</span> {{ errorMessage }}
        </div>
      }
      @if (successMessage) {
        <div class="alert alert-success rounded-3 d-flex align-items-center gap-2" role="alert">
          <span>✅</span> {{ successMessage }}
        </div>
      }

      <form [formGroup]="prescriptionForm" (ngSubmit)="onSubmit()">
        
        <input type="hidden" formControlName="consultationId">
        <input type="hidden" formControlName="doctorId">
        <input type="hidden" formControlName="appointmentId">
        <input type="hidden" formControlName="date">

        <div class="mb-4">
          <label class="form-label fw-bold text-dark fs-6 mb-2">Clinical Notes & Diagnosis</label>
          <textarea 
            formControlName="notes" 
            class="form-control rounded-3 border-secondary-subtle p-3 shadow-sm" 
            rows="4" 
            placeholder="Write patient's symptoms, diagnosis notes, and recovery advice here...">
          </textarea>
        </div>

        <div class="border-top my-4"></div>

        <div class="d-flex justify-content-between align-items-center mb-4">
          <h5 class="text-secondary fw-bold mb-0 d-flex align-items-center gap-2">
            <span>💊</span> Prescribed Medications
          </h5>
          <button type="button" class="btn btn-sm btn-outline-success rounded-pill px-3 fw-semibold shadow-sm d-flex align-items-center gap-1" (click)="addMedicine()">
            <span>➕</span> Add Medicine
          </button>
        </div>

        <div formArrayName="prescriptions">
          @for (med of prescriptions.controls; track $index) {
            <div [formGroupName]="$index" class="row g-3 p-3 mb-3 border border-light-subtle rounded-4 bg-light shadow-sm align-items-end position-relative mx-0 transition-all hover-shadow">
              
              <div class="col-md-4">
                <label class="form-label small fw-bold text-secondary">Medicine Name</label>
                <input type="text" formControlName="medicineName" class="form-control rounded-3" placeholder="E.g. Paracetamol / Amoxicillin">
              </div>

              <div class="col-md-3">
                <label class="form-label small fw-bold text-secondary">Dosage</label>
                <input type="text" formControlName="dosage" class="form-control rounded-3" placeholder="E.g. 500mg / 1 Tablet">
              </div>

              <div class="col-md-2">
                <label class="form-label small fw-bold text-secondary">Route</label>
                <select formControlName="route" class="form-select rounded-3 shadow-sm">
                  <option value="Oral">Oral</option>
                  <option value="Injection">Injection</option>
                </select>
              </div>

              <div class="col-md-2">
                <label class="form-label small fw-bold text-secondary">Frequency</label>
                <input type="text" formControlName="frequency" class="form-control rounded-3" placeholder="E.g. 1-0-1 / Once a day">
              </div>

              <div class="col-md-1 text-center">
                <button type="button" class="btn btn-sm btn-outline-danger rounded-circle p-2 shadow-sm d-inline-flex align-items-center justify-content-center" style="width: 34px; height: 34px;" (click)="removeMedicine($index)">
                  ✕
                </button>
              </div>
            </div>
          }
        </div>

        <div class="d-flex justify-content-end gap-3 mt-4 pt-3 border-top">
          <button type="button" class="btn btn-light border rounded-pill px-4 fw-medium shadow-sm" [disabled]="isSubmitting" (click)="prescriptionSaved.emit()">
            Cancel
          </button>
          <button type="submit" class="btn btn-primary rounded-pill px-5 fw-bold shadow-sm" [disabled]="isSubmitting || prescriptionForm.invalid">
            @if (isSubmitting) {
              <span class="spinner-border spinner-border-sm me-2"></span> Saving...
            } @else {
              💾 Save Prescription
            }
          </button>
        </div>

      </form>
    </div>
  </div>
</div>
