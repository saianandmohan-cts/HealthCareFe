<div *ngFor="let val of (pastConsultations$ | async)" class="border-bottom pb-2 mb-3">
  <p class="mb-1 fw-bold text-dark">Patient Name: {{val.patient.name}}</p>
  <p class="mb-1 text-secondary small">Patient ID: {{val.patient.patientId}}</p>
  <p class="mb-1 text-secondary small">Date: {{val.date}}</p>
  <p class="mb-1 text-secondary small">Time: {{val.time}}</p>
  <p class="mb-0 text-muted">Status: {{val.status}}</p>

  <button class="button" (click)="expandPatientInfo(val)">
    View Details
  </button>

  <div class="modal-overlay" *ngIf="selectedConsultation">
    <div class="modal-content">
      <span class="close-btn" (click)="closeModal()">✖</span>
      <h5>Consultation Details</h5>
      <p><strong>Notes:</strong> {{selectedConsultation.notes}}</p>

      <h4>Prescriptions:</h4>
      <ul>
        <li *ngFor="let rx of selectedConsultation.prescriptions">
          {{rx.name}} - {{rx.dosage}} ({{rx.route}}, {{rx.frequency}})
        </li>
      </ul>
    </div>
  </div>
</div>
